default:
  tags:
    - rke

variables:
  BUILDER_IMAGE: "registry.access.redhat.com/ubi8/go-toolset:1.21"
  GOPATH: $CI_PROJECT_DIR/.go
  GOCACHE: $CI_PROJECT_DIR/.gocache

stages:
  - build
  - containerize
  - release

# Reusable rule for standard branch-only jobs
.branch_rules:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Stage: Build (UI & API)
# ---------------------------------------------------------------------------
build-ui:
  stage: build
  extends: .branch_rules
  image: registry.access.redhat.com/ubi8/nodejs-20:latest
  cache:
    key: "ui-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - ui/node_modules
  script:
    - cd ui
    - npm install
    - npm run build
  artifacts:
    paths:
      - ui/out
    expire_in: 1 hour

build-api:
  stage: build
  extends: .branch_rules
  image: $BUILDER_IMAGE
  cache:
    key: "api-deps-$CI_COMMIT_REF_SLUG"
    paths:
      - .go/pkg/mod
      - .gocache
  needs:
    - build-ui
  script:
    - mkdir -p api/ui/out
    - cp -a ui/out/. api/ui/out/
    - go build -buildvcs=false -o helmify-api ./api
  artifacts:
    paths:
      - helmify-api
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# Stage: Containerize (Assemble Image)
# ---------------------------------------------------------------------------
setup-vars:
  stage: containerize
  extends: .branch_rules
  image: $BUILDER_IMAGE
  script:
    - TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - IMAGE="${QUAY_URL}/ca/helmify:${TAG}"
    - echo "TAG=$TAG" > build.env
    - echo "IMAGE=$IMAGE" >> build.env
  artifacts:
    reports:
      dotenv: build.env

# ---------------------------------------------------------------------------
# Stage: Containerize (Build -> Image)
# ---------------------------------------------------------------------------
push-to-quay:
  stage: containerize
  extends: .branch_rules
  image: registry.access.redhat.com/ubi8/podman:latest
  needs:
    - job: setup-vars
      artifacts: true
    - job: build-api
      artifacts: true
  variables:
    STORAGE_DRIVER: overlay
    BUILDAH_ISOLATION: chroot
  script:
    - podman login $QUAY_URL -u $QUAY_USER -p $QUAY_PASS --tls-verify=false
    - podman build --tls-verify=false -f Containerfile -t "$IMAGE" .
    - podman push "$IMAGE" --tls-verify=false

release-version:
  stage: release
  image: quay.io/skopeo/stable:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      skopeo copy \
        --src-creds="${QUAY_USER}:${QUAY_PASS}" \
        --dest-creds="${QUAY_USER}:${QUAY_PASS}" \
        --src-tls-verify=false \
        --dest-tls-verify=false \
        "docker://${QUAY_URL}/ca/helmify:${CI_COMMIT_SHORT_SHA}" \
        "docker://${QUAY_URL}/ca/helmify:prd-${CI_COMMIT_TAG}"