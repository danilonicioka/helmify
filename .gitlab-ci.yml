default:
  tags:
    - ocp-dev-global

variables:
  BUILDER_IMAGE: "registry.access.redhat.com/ubi8/go-toolset:1.21"
  GOPATH: $CI_PROJECT_DIR/.go
  GOCACHE: $CI_PROJECT_DIR/.gocache

stages:
  - test
  - lint
  - containerize

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .go/pkg/mod
    - .gocache

# ---------------------------------------------------------------------------
# Stage: Test (Variable Setup)
# ---------------------------------------------------------------------------
setup-vars:
  stage: test
  image: $BUILDER_IMAGE
  script:
    - TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - IMAGE="${QUAY_URL}/${CI_PROJECT_PATH}:${TAG}"
    - echo "TAG=$TAG" > build.env
    - echo "IMAGE=$IMAGE" >> build.env
  artifacts:
    reports:
      dotenv: build.env

# ---------------------------------------------------------------------------
# Stage: Lint (Code Quality)
# ---------------------------------------------------------------------------
lint-app:
  stage: lint
  image: $BUILDER_IMAGE
  script:
    - echo "Running golangci-lint..."
    - golangci-lint run ./...

# ---------------------------------------------------------------------------
# Stage: Containerize (Build -> Image)
# ---------------------------------------------------------------------------
push-to-quay:
  stage: containerize
  image: registry.access.redhat.com/ubi8/podman:latest
  tags:
    - rancher
  needs:
    - job: setup-vars
      artifacts: true
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot
  script:
    - podman login $QUAY_URL -u $QUAY_USER -p $QUAY_PASS --tls-verify=false
    - podman build --tls-verify=false -f Containerfile -t "$IMAGE" .
    - podman push "$IMAGE" --tls-verify=false
