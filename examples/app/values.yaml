kubernetesClusterDomain: cluster.local
batch:
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

  backoffLimit: 4
  pi:
    image:
      repository: perl
      tag: 5.34.0
cron:
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

  schedule: '* * * * *'

  hello:
    image:
      repository: busybox
      tag: "1.28"
    imagePullPolicy: IfNotPresent
fluentdElasticsearch:
  nodeSelector: {}
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/master
      operator: Exists
  topologySpreadConstraints: []

  fluentdElasticsearch:
    image:
      repository: quay.io/fluentd_elasticsearch/fluentd
      tag: v2.5.2
    resources:
      limits:
        memory: 200Mi
      requests:
        cpu: 100m
        memory: 200Mi
myConfig:
  dummyconfigmapkey: dummyconfigmapvalue

  myConfigProperties:
    health:
      healthProbeBindAddress: "8081"
    metrics:
      bindAddress: 127.0.0.1:8080
myConfigProps:
  myProp1: "1"
  myProp2: val 1
  myProp3: "true"
  myvalYaml: |-
    apiVersion: clickhouse.altinity.com/v1
    kind: ClickHouseInstallationTemplate
    metadata:
      name: default-oneperhost-pod-template
    spec:
      templates:
        podTemplates:
          - name: default-oneperhost-pod-template
            distribution: "OnePerHost"
mySecretCa:
  caCrt: ""
mySecretVars:
  elasticFoobarHunter123MeowtownVerify: ""
  str: ""
  var1: ""
  var2: ""
myapp:
  nodeSelector:
    region: east
    type: user-node
  podSecurityContext:
    fsGroup: 20000
    runAsNonRoot: true
    runAsUser: 65532
  replicas: 3
  revisionHistoryLimit: 5
  tolerations: []
  topologySpreadConstraints: []

  ipFamilyPolicy: SingleStack

  ports:
    - name: https
      targetPort: https
      port: 8443
    - name: https
      targetPort: https
      port: 8443
    - name: https
      targetPort: https
      port: 8443
  type: ClusterIP

  app:
    image:
      repository: controller
      tag: latest
    resources:
      limits:
        cpu: 100m
        memory: 30Mi
      requests:
        cpu: 100m
        memory: 20Mi
    args:
      - --health-probe-bind-address=:8081
      - --metrics-bind-address=127.0.0.1:8080
      - --leader-elect
    containerSecurityContext:
      allowPrivilegeEscalation: false
  initContainer:
    image:
      repository: bash
      tag: latest
  ipFamilies:
    - IPv4
  loadBalancerSourceRanges:
    - 10.0.0.0/8
  proxySidecar:
    image:
      repository: gcr.io/kubebuilder/kube-rbac-proxy
      tag: v0.8.0
    args:
      - --secure-listen-address=0.0.0.0:8443
      - --v=10
nginx:
  ports:
    - name: web
      port: 80
      targetPort: 0
  type: ClusterIP

  minAvailable: 2
pvc:
  mySamplePvClaim:
    storageClass: manual
    storageLimit: 5Gi
    storageRequest: 3Gi
web:
  nodeSelector: {}
  replicas: 2
  tolerations: []
  topologySpreadConstraints: []

  nginx:
    image:
      repository: registry.k8s.io/nginx-slim
      tag: "0.8"
  volumeClaims:
    www:
      requests:
        storage: 1Gi
