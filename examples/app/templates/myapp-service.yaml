apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-myapp-service
  labels:
    app: myapp
  {{- include "app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.myapp.type }}
  selector:
    app: myapp
    {{- include "app.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.myapp.ports | toYaml | nindent 2 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-myapp-lb-service
  labels:
    app: myapp
  {{- include "app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.myapp.type }}
  selector:
    app: myapp
    {{- include "app.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.myapp.ports | toYaml | nindent 2 }}
  loadBalancerSourceRanges:
  {{- .Values.myapp.loadBalancerSourceRanges | toYaml | nindent 2 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}-myapp-ipfamily-service
  labels:
    app: myapp
  {{- include "app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.myapp.type }}
  selector:
    app: myapp
    {{- include "app.selectorLabels" . | nindent 4 }}
  {{- if .Values.myapp.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.myapp.ipFamilyPolicy }}
  {{- end }}
  {{- if .Values.myapp.ipFamilies }}
  ipFamilies:
  {{- .Values.myapp.ipFamilies | toYaml | nindent 2 }}
  {{- end }}
  ports:
  {{- .Values.myapp.ports | toYaml | nindent 2 }}
