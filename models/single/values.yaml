# Standardized TJPA Helm Chart values.yaml
# Designed in compliance with OpenShift Security Context Constraints (SCC)
# and the 6 Core Architectural Rules.

# ==============================================================================
# I. CHART-WIDE OPTIONS
# ==============================================================================
# -- Domain of the Kubernetes cluster.
kubernetesClusterDomain: cluster.local

# -- Overrides the default name/fullname.
nameOverride: ""
fullnameOverride: ""

# -- Global configuration shared across all deployments in the chart.
global:
  cm:
    TZ: "America/Belem"
  secret: {}

# ==============================================================================
# II. APPLICATION DEPLOYMENT CONFIGURATION (chart-model-single)
# ==============================================================================
# For a single deployment, the key is the name of the application (chart name).
chart-model-single:

  # ----------------------------------------------------------------------------
  # 1. CORE WORKLOAD SETTINGS (Most Frequently Modified)
  # ----------------------------------------------------------------------------
  # -- Number of replica pods.
  replicas: 0

  # -- Custom labels to add to the deployment/pods
  labels: {}
    # app.openshift.io/runtime: openjdk
  # -- Custom annotations to add to the deployment 
  annotations: {}
    # app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"db"}]'

  image:
    # -- Quay Registry is used to avoid Docker Hub rate limiting.
    repository: tjpa-registry-quay-quay-enterprise.apps.ocp-hub.i.tj.pa.gov.br/devops/chart-model-app
    # -- Defaults to Chart.appVersion if not specified.
    tag: "latest"
    pullPolicy: IfNotPresent

  # ----------------------------------------------------------------------------
  # 2. APPLICATION CONFIGURATION (Variables & Credentials)
  # ----------------------------------------------------------------------------
  # ConfigMaps unique to this service container.
  cm: {}

  # Sensitive variables unique to this service container (Secrets).
  secret: {}

  # ----------------------------------------------------------------------------
  # 3. ROUTING & NETWORKING
  # ----------------------------------------------------------------------------
  route:
    # -- Shared annotations for routes.
    annotations: {}
    
    # -- Shared TLS edge termination configuration.
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

    # -- Shared path for routes.
    path: "/"

    # -- Internal Route with self-signed certificate (to default OCP apps).
    default:
      enabled: true
      host: chart-model-single.apps.ocp-dev.i.tj.pa.gov.br

    # -- Internal Route with valid certificate (to intranet TJPA).
    internal:
      enabled: false
      host: chart-model-single-i.tjpa.jus.br

    # -- External Route with valid certificate (to internet TJPA).
    external:
      enabled: false
      host: chart-model.tjpa.jus.br

  # -- Internal Kubernetes Service Configuration.
  service:
    type: ClusterIP
    ports:
      - port: 8080
        targetPort: 8080
        protocol: TCP
        name: http

  # ----------------------------------------------------------------------------
  # 4. RESOURCES (Operational Overlay-Only)
  # ----------------------------------------------------------------------------
  # Kept empty by default; the recommended configuration is commented below.
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 256Mi

  # ----------------------------------------------------------------------------
  # 5. TIERED "FAIL-FAST" HEALTH PROBES (tcpSocket & Zero-Delay)
  # ----------------------------------------------------------------------------
  # Probes are empty by default; the recommended tcpSocket configuration is commented below.
  startupProbe: {}
  # startupProbe:
  #   tcpSocket:
  #     port: 8080
  #   initialDelaySeconds: 0
  #   periodSeconds: 5
  #   failureThreshold: 30
  #   successThreshold: 1

  livenessProbe: {}
  # livenessProbe:
  #   tcpSocket:
  #     port: 8080
  #   initialDelaySeconds: 0
  #   periodSeconds: 10
  #   failureThreshold: 3
  #   successThreshold: 1

  readinessProbe: {}
  # readinessProbe:
  #   tcpSocket:
  #     port: 8080
  #   initialDelaySeconds: 0
  #   periodSeconds: 10
  #   failureThreshold: 3
  #   successThreshold: 1

  # ----------------------------------------------------------------------------
  # 6. LIFECYCLE & HA STRATEGY
  # ----------------------------------------------------------------------------
  # -- Deployment strategy. Use 'RollingUpdate' or 'Recreate' (e.g. for RWO volume claims).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  
  # -- Connection draining grace period for graceful shutdowns.
  terminationGracePeriodSeconds: 30

# ==============================================================================
# III. GLOBAL SCHEDULING & COMMON CONFIGS
# ==============================================================================
imagePullSecrets: []

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - chart-model-single
          topologyKey: kubernetes.io/hostname
