{{- if and .Values.global .Values.global.secret (not (empty .Values.global.secret)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart-model-single.fullname" . }}-global
  labels:
    {{- include "chart-model-single.labels" . | nindent 4 }}
type: Opaque
data:
{{- range $key, $val := .Values.global.secret }}
  {{ $key }}: {{ $val | b64enc | quote }}
{{- end }}
{{- end }}
