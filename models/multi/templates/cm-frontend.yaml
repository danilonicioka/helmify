{{- if and .Values.frontend .Values.frontend.cm (not (empty .Values.frontend.cm)) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-model-multi.fullname" . }}-frontend-cm
  labels:
    {{- include "chart-model-multi.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  {{- range $key, $val := .Values.frontend.cm }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
