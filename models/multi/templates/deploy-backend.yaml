apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-model-multi.fullname" . }}-backend
  labels:
    {{- include "chart-model-multi.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not (kindIs "nil" .Values.backend.replicas) }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  {{- if .Values.backend.strategy }}
  strategy:
    {{- toYaml .Values.backend.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart-model-multi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        # Deterministic Rollouts: SHA256 checksum annotations to trigger automatic restarts
        {{- if .Values.global }}
        checksum/global-config: '{{ include (print $.Template.BasePath "/cm-global.yaml") . | sha256sum }}'
        {{- end }}
        {{- if and .Values.backend.cm (not (empty .Values.backend.cm)) }}
        checksum/cm-config: '{{ include (print $.Template.BasePath "/cm-backend.yaml") . | sha256sum }}'
        {{- end }}
        {{- if and .Values.backend.secret (not (empty .Values.backend.secret)) }}
        checksum/secret: '{{ include (print $.Template.BasePath "/secret-backend.yaml") . | sha256sum }}'
        {{- end }}
      labels:
        {{- include "chart-model-multi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          
          # Clean Configuration Management: Full Decoupling via envFrom
          envFrom:
            {{- if .Values.global }}
            - configMapRef:
                name: {{ include "chart-model-multi.fullname" . }}-global
            {{- end }}
            {{- if and .Values.backend.cm (not (empty .Values.backend.cm)) }}
            - configMapRef:
                name: {{ include "chart-model-multi.fullname" . }}-backend-cm
            {{- end }}
            {{- if and .Values.backend.secret (not (empty .Values.backend.secret)) }}
            - secretRef:
                name: {{ include "chart-model-multi.fullname" . }}-backend-secret
            {{- end }}

          # Tiered "Fail-Fast" Health Probes
          {{- if and .Values.backend.startupProbe .Values.backend.startupProbe.tcpSocket }}
          startupProbe:
            {{- toYaml .Values.backend.startupProbe | nindent 12 }}
          {{- end }}
          {{- if and .Values.backend.livenessProbe .Values.backend.livenessProbe.tcpSocket }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if and .Values.backend.readinessProbe .Values.backend.readinessProbe.tcpSocket }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          {{- end }}

          # Resources (Operational Overlay-Only)
          {{- if and .Values.backend.resources .Values.backend.resources.limits }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- end }}
      
      # Graceful connection draining lifecycle settings
      {{- if .Values.backend.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
