{{- if and .Values.backend .Values.backend.route .Values.backend.route.external.enabled -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "chart-model-multi.fullname" . }}-backend-ext
  labels:
    {{- include "chart-model-multi.backend.labels" . | nindent 4 }}
  {{- with .Values.backend.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.backend.route.external.host }}
  host: {{ .Values.backend.route.external.host | quote }}
  {{- end }}
  {{- if .Values.backend.route.path }}
  path: {{ .Values.backend.route.path | quote }}
  {{- end }}
  {{- if .Values.backend.route.tls }}
  tls:
    {{- toYaml .Values.backend.route.tls | nindent 4 }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "chart-model-multi.fullname" . }}-backend
    weight: 100
  port:
    targetPort: http
  wildcardPolicy: None
{{- end }}
