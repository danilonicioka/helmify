apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-model-multi.fullname" . }}-frontend
  labels:
    {{- include "chart-model-multi.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  {{- if not (kindIs "nil" .Values.frontend.replicas) }}
  replicas: {{ .Values.frontend.replicas }}
  {{- end }}
  {{- if .Values.frontend.strategy }}
  strategy:
    {{- toYaml .Values.frontend.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart-model-multi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        # Deterministic Rollouts: SHA256 checksum annotations to trigger automatic restarts
        {{- if .Values.global }}
        checksum/global-config: '{{ include (print $.Template.BasePath "/cm-global.yaml") . | sha256sum }}'
        {{- end }}
        {{- if and .Values.frontend.cm }}
        checksum/cm-config: '{{ include (print $.Template.BasePath "/cm-frontend.yaml") . | sha256sum }}'
        {{- end }}
        {{- if and .Values.frontend.secret }}
        checksum/secret: '{{ include (print $.Template.BasePath "/secret-frontend.yaml") . | sha256sum }}'
        {{- end }}
      labels:
        {{- include "chart-model-multi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
              protocol: TCP
          
          # Clean Configuration Management: Full Decoupling via envFrom
          envFrom:
            {{- if .Values.global }}
            - configMapRef:
                name: {{ include "chart-model-multi.fullname" . }}-global
            {{- end }}
            {{- if and .Values.frontend.cm }}
            - configMapRef:
                name: {{ include "chart-model-multi.fullname" . }}-frontend-cm
            {{- end }}
            {{- if and .Values.frontend.secret }}
            - secretRef:
                name: {{ include "chart-model-multi.fullname" . }}-frontend-secret
            {{- end }}

          # Tiered "Fail-Fast" Health Probes
          {{- if and .Values.frontend.startupProbe .Values.frontend.startupProbe.tcpSocket }}
          startupProbe:
            {{- toYaml .Values.frontend.startupProbe | nindent 12 }}
          {{- end }}
          {{- if and .Values.frontend.livenessProbe .Values.frontend.livenessProbe.tcpSocket }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if and .Values.frontend.readinessProbe .Values.frontend.readinessProbe.tcpSocket }}
          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}
          {{- end }}

          # Resources (Operational Overlay-Only)
          {{- if and .Values.frontend.resources .Values.frontend.resources.limits }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          {{- end }}
      
      # Graceful connection draining lifecycle settings
      {{- if .Values.frontend.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.frontend.terminationGracePeriodSeconds }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
