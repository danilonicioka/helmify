apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-model-multi.fullname" . }}-frontend
  labels:
    {{- include "chart-model-multi.frontend.labels" . | nindent 4 }}
  {{- $annotations := include "chart-model-multi.frontend.annotations" . }}
  {{- if or .Values.frontend.connectsTo $annotations }}
  annotations:
    {{- if .Values.frontend.connectsTo }}
    app.openshift.io/connects-to: '[
      {{- $first := true -}}
      {{- range $item := .Values.frontend.connectsTo -}}
        {{- if not $first }},{{- end -}}
        {{- $kind := "Deployment" -}}
        {{- $apiVersion := "apps/v1" -}}
        {{- $nameSuffix := "" -}}
        {{- if typeIs "string" $item -}}
          {{- $nameSuffix = $item -}}
          {{- if eq $item "db" -}}
            {{- $kind = "StatefulSet" -}}
          {{- end -}}
        {{- else -}}
          {{- $kind = default "Deployment" $item.kind -}}
          {{- $apiVersion = default "apps/v1" $item.apiVersion -}}
          {{- $nameSuffix = $item.name -}}
        {{- end -}}
        {"apiVersion":"{{ $apiVersion }}","kind":"{{ $kind }}","name":"{{ include "chart-model-multi.fullname" $ }}-{{ $nameSuffix }}"}
        {{- $first = false -}}
      {{- end -}}
    ]'
    {{- end }}
    {{- if $annotations }}
    {{- $annotations | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if not (kindIs "nil" .Values.frontend.replicas) }}
  replicas: {{ .Values.frontend.replicas }}
  {{- end }}
  {{- if .Values.frontend.strategy }}
  strategy:
    {{- toYaml .Values.frontend.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart-model-multi.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Deterministic Rollouts: SHA256 checksum annotations to trigger automatic restarts
        {{- if and .Values.global (not (empty .Values.global)) }}
        checksum/global-config: '{{ include (print $.Template.BasePath "/cm-global.yaml") . | sha256sum }}'
        {{- end }}
        {{- if and .Values.frontend.cm (not (empty .Values.frontend.cm)) }}
        checksum/cm-config: '{{ include (print $.Template.BasePath "/cm-frontend.yaml") . | sha256sum }}'
        {{- end }}
        {{- if and .Values.frontend.secret (not (empty .Values.frontend.secret)) }}
        checksum/secret: '{{ include (print $.Template.BasePath "/secret-frontend.yaml") . | sha256sum }}'
        {{- end }}
      labels:
        {{- include "chart-model-multi.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
          
          # Clean Configuration Management: Full Decoupling via envFrom
          {{- if or (and .Values.global (not (empty .Values.global))) (and .Values.frontend.cm (not (empty .Values.frontend.cm))) (and .Values.frontend.secret (not (empty .Values.frontend.secret))) }}
          envFrom:
            {{- if and .Values.global (not (empty .Values.global)) }}
            - configMapRef:
                name: {{ include "chart-model-multi.fullname" . }}-global
            {{- end }}
            {{- if and .Values.frontend.cm (not (empty .Values.frontend.cm)) }}
            - configMapRef:
                name: {{ include "chart-model-multi.fullname" . }}-frontend-cm
            {{- end }}
            {{- if and .Values.frontend.secret (not (empty .Values.frontend.secret)) }}
            - secretRef:
                name: {{ include "chart-model-multi.fullname" . }}-frontend-secret
            {{- end }}
          {{- end }}

          # Tiered "Fail-Fast" Health Probes
          {{- if and .Values.frontend.startupProbe .Values.frontend.startupProbe.tcpSocket }}
          startupProbe:
            {{- toYaml .Values.frontend.startupProbe | nindent 12 }}
          {{- end }}
          {{- if and .Values.frontend.livenessProbe .Values.frontend.livenessProbe.tcpSocket }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if and .Values.frontend.readinessProbe .Values.frontend.readinessProbe.tcpSocket }}
          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}
          {{- end }}

          # Resources (Operational Overlay-Only)
          {{- if and .Values.frontend.resources .Values.frontend.resources.limits }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          {{- end }}
      
      # Graceful connection draining lifecycle settings
      {{- if .Values.frontend.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.frontend.terminationGracePeriodSeconds }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.frontend.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.frontend.topologySpreadConstraints | nindent 8 }}
      {{- end }}
