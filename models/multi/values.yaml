# Standardized TJPA Helm Chart values.yaml (Multi-Deployment Model)
# Designed in compliance with OpenShift Security Context Constraints (SCC)
# and the 6 Core Architectural Rules.

# ==============================================================================
# I. CHART-WIDE OPTIONS
# ==============================================================================
# -- Domain of the Kubernetes cluster.
kubernetesClusterDomain: cluster.local

# -- Overrides the default name/fullname.
nameOverride: ""
fullnameOverride: ""

# -- Global configuration shared across all deployments in the chart.
global:
  TZ: "America/Belem"

# ==============================================================================
# II. BACKEND COMPONENT CONFIGURATION
# ==============================================================================
backend:
  # ----------------------------------------------------------------------------
  # 1. CORE WORKLOAD SETTINGS (Most Frequently Modified)
  # ----------------------------------------------------------------------------
  # -- Number of replica pods.
  replicas: 0

  image:
    # -- Quay Registry is used to avoid Docker Hub rate limiting.
    repository: tjpa-registry-quay-quay-enterprise.apps.ocp-hub.i.tj.pa.gov.br/devops/chart-model-backend
    pullPolicy: IfNotPresent
    # -- Defaults to Chart.appVersion if not specified.
    tag: "latest"

  # ----------------------------------------------------------------------------
  # 2. APPLICATION CONFIGURATION (Variables & Credentials)
  # ----------------------------------------------------------------------------
  # ConfigMaps unique to this service container.
  cm: {}

  # Sensitive variables unique to this service container (Secrets).
  secret: {}

  # ----------------------------------------------------------------------------
  # 3. ROUTING & NETWORKING
  # ----------------------------------------------------------------------------
  route:
    # -- Shared annotations for routes.
    annotations: {}
    
    # -- Shared TLS edge termination configuration.
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

    # -- Shared path for routes.
    path: "/api"

    # -- Internal Route with self-signed certificate (to default OCP apps).
    default:
      enabled: true
      host: chart-model-backend.apps.ocp-dev.i.tj.pa.gov.br

    # -- Internal Route with valid certificate (to intranet TJPA).
    internal:
      enabled: false
      host: chart-model-backend-int.i.tjpa.jus.br

    # -- External Route with valid certificate (to internet TJPA).
    external:
      enabled: false
      host: chart-model-backend.tjpa.jus.br

  # -- Internal Kubernetes Service Configuration.
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  # ----------------------------------------------------------------------------
  # 4. RESOURCES (Operational Overlay-Only)
  # ----------------------------------------------------------------------------
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 256Mi

  # ----------------------------------------------------------------------------
  # 5. TIERED "FAIL-FAST" HEALTH PROBES (tcpSocket & Zero-Delay)
  # ----------------------------------------------------------------------------
  startupProbe: {}
  # startupProbe:
  #   tcpSocket:
  #     port: 8080
  #   initialDelaySeconds: 0
  #   periodSeconds: 5
  #   failureThreshold: 30
  #   successThreshold: 1

  livenessProbe: {}
  # livenessProbe:
  #   tcpSocket:
  #     port: 8080
  #   initialDelaySeconds: 0
  #   periodSeconds: 10
  #   failureThreshold: 3
  #   successThreshold: 1

  readinessProbe: {}
  # readinessProbe:
  #   tcpSocket:
  #     port: 8080
  #   initialDelaySeconds: 0
  #   periodSeconds: 10
  #   failureThreshold: 3
  #   successThreshold: 1

  # ----------------------------------------------------------------------------
  # 6. LIFECYCLE & HA STRATEGY
  # ----------------------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  
  terminationGracePeriodSeconds: 30

# ==============================================================================
# III. FRONTEND COMPONENT CONFIGURATION
# ==============================================================================
frontend:
  # ----------------------------------------------------------------------------
  # 1. CORE WORKLOAD SETTINGS
  # ----------------------------------------------------------------------------
  replicas: 0

  image:
    repository: tjpa-registry-quay-quay-enterprise.apps.ocp-hub.i.tj.pa.gov.br/devops/chart-model-frontend
    pullPolicy: IfNotPresent
    tag: "latest"

  # ----------------------------------------------------------------------------
  # 2. APPLICATION CONFIGURATION
  # ----------------------------------------------------------------------------
  cm: {}
  
  # No default secrets for web frontend component
  secret: {}

  # ----------------------------------------------------------------------------
  # 3. ROUTING & NETWORKING
  # ----------------------------------------------------------------------------
  route:
    annotations: {}
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    path: "/"
    default:
      enabled: true
      host: chart-model-frontend.apps.ocp-dev.i.tj.pa.gov.br
    internal:
      enabled: false
      host: chart-model-frontend-int.i.tjpa.jus.br
    external:
      enabled: false
      host: chart-model-frontend.tjpa.jus.br

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  # ----------------------------------------------------------------------------
  # 4. RESOURCES
  # ----------------------------------------------------------------------------
  resources: {}

  # ----------------------------------------------------------------------------
  # 5. TIERED "FAIL-FAST" HEALTH PROBES
  # ----------------------------------------------------------------------------
  startupProbe: {}
  livenessProbe: {}
  readinessProbe: {}

  # ----------------------------------------------------------------------------
  # 6. LIFECYCLE & HA STRATEGY
  # ----------------------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  
  terminationGracePeriodSeconds: 30

# ==============================================================================
# IV. GLOBAL SCHEDULING & COMMON CONFIGS
# ==============================================================================
imagePullSecrets: []

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - chart-model-multi
          topologyKey: kubernetes.io/hostname
