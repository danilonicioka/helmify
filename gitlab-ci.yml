default:
  image: tjpa-registry-quay-quay-enterprise.apps.ocp-hub.i.tj.pa.gov.br/devops/runner-tools:latest
  tags:
    - ocp-dev-global

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'  # Trigger manual
    - when: never                         # Bloqueia outros

stages:
  - prepare
  - deploy

variables:
  # 1. The Action Selector
  PIPELINE_ACTION:
    description: "Deploy/update env or update tag"
    value: "deploy_update_env"
    options:
      - "update_tag"   # Promotes the tags currently in DEV to the chosen ENV
      - "deploy_update_env"       # Triggers devops/cicd pipeline for a fresh setup

  # 2. Target Environment
  ENV_: 
    description: "Target Environment (If promoting, DEV will be copied to this env):"
    value: "prd"
    options:
      - "hml"
      - "prd"
      - "dev"

  # 3. Enable Custom Application (CA) source
  ENABLE_CA_SOURCE:
    description: "Enable values from gitlab-ca as source"
    value: "false"
    options:
      - "false"
      - "true"

  # 4. Dev Application Repository Revision
  DEV_APP_REPO_REVISION:
    description: "Branch, tag or commit SHA for the developer CA source repository:"
    value: "main"
    options:
      - "main"
      - "hml"
      - "dev"
      - "develop"
      - "homolog"

# ==========================================
# PATH A: Trigger the devops/cicd pipeline
# ==========================================
get_chart_version:
  stage: prepare
  rules:
    - if: '$PIPELINE_ACTION == "deploy_update_env"'
  script:
    - export CHART_VERSION="$(grep -E '^[[:space:]]*version:[[:space:]]*' chart/Chart.yaml | head -n1 | sed -E 's/^[[:space:]]*version:[[:space:]]*//')"
    - echo "Detected chart version $CHART_VERSION"
    - export DEV_APP_REPO_URL="$(grep -E '^[[:space:]]*tjpa.jus.br/dev-source-repo:[[:space:]]*' chart/Chart.yaml | head -n1 | sed -E 's|^[[:space:]]*tjpa.jus.br/dev-source-repo:[[:space:]]*||' | tr -d '\"' | tr -d "\'")"
    - |
      if [ -z "$DEV_APP_REPO_URL" ]; then
        echo "Aviso: Anotação 'tjpa.jus.br/dev-source-repo' não encontrada no Chart.yaml."
      else
        echo "Detected dev source repo $DEV_APP_REPO_URL"
      fi
    - echo "CHART_VERSION=$CHART_VERSION" > variables.env
    - echo "DEV_APP_REPO_URL=$DEV_APP_REPO_URL" >> variables.env
  artifacts:
      reports:
        dotenv: variables.env

deploy_new_env:
  stage: deploy
  needs: ["get_chart_version"]
  rules:
    - if: '$PIPELINE_ACTION == "deploy_update_env"'
  trigger:
    project: "devops/cicd"
    branch: main
    strategy: depend
  variables:
    APP_NAME: $CI_PROJECT_NAME
    DEPLOY_MODE: "helm"
    ENV: $ENV_
    PROJ_CHART_VERSION: $CHART_VERSION
    ENABLE_CA_SOURCE: $ENABLE_CA_SOURCE
    DEV_APP_REPO_URL: $DEV_APP_REPO_URL
    DEV_APP_REPO_REVISION: $DEV_APP_REPO_REVISION

# ==========================================
# PATH B: Promote the tags locally and Sync
# ==========================================
update_tag_job:
  stage: deploy
  image:
    name: alpine/kubectl:latest
    entrypoint: [""]
  rules:
    - if: '$PIPELINE_ACTION == "update_tag"'
  before_script:
    - apk add --no-cache curl git jq yq
  script:
    - |
      echo "Promoting all image tags from DEV to $ENV_..."

      # 1. Git Authentication & Checkout
      git remote set-url origin "http://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git config --global user.name "GitLab CI Promotion Bot"
      git config --global user.email "ci-bot@tj.pa.gov.br"
      git checkout -B $CI_COMMIT_BRANCH

      # 2. Extract all paths that have a "tag" key (e.g., "image.tag", "api.image.tag")
      # This creates a list of paths like: 
      # image
      # services.api.image
      TAG_PATHS=$(yq eval '.. | select(has("tag")) | path | join(".")' values-ca.yaml)

      if [ -z "$TAG_PATHS" ]; then
        echo "No 'tag' keys found in values-ca.yaml. Skipping."
        exit 0
      fi

      # 3. Iterate through every path found and update the target file
      for PATH_NAME in $TAG_PATHS; do
        # Get the tag value from the DEV file for this specific path
        NEW_TAG=$(yq eval ".${PATH_NAME}.tag" values-ca.yaml)
        
        echo "Updating .${PATH_NAME}.tag to ${NEW_TAG} in values-${ENV_}.yaml"
        
        # Apply the update to the target environment file
        yq eval -i ".${PATH_NAME}.tag = \"${NEW_TAG}\"" "values-${ENV_}.yaml"
      done

      # 4. Commit and Push
      git add "values-${ENV_}.yaml"
      
      # Check if there are actually changes to avoid 'empty commit' errors
      if git diff --cached --quiet; then
        echo "No changes detected. The $ENV_ environment is already up to date."
      else
        git commit -m "chore(release): promote all image tags to ${ENV_}"
        git push origin $CI_COMMIT_BRANCH
        echo "✅ Successfully promoted tags to Git!"

        # 5. Trigger ArgoCD Sync
        ARGOCD_APP_NAME="${CI_PROJECT_NAME}-${ENV_}"
        ARGOCD_SERVER="https://openshift-gitops-server-openshift-gitops.apps.ocp-hub.i.tj.pa.gov.br"
        
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -k -X POST "${ARGOCD_SERVER}/api/v1/applications/${ARGOCD_APP_NAME}/sync" \
          -H "Authorization: Bearer $ARGOCD_TOKEN" \
          -H "Content-Type: application/json")

        if [ "$HTTP_STATUS" -eq 200 ]; then
          echo "✅ Successfully triggered ArgoCD sync!"
        else
          echo "⚠️ ArgoCD sync trigger returned status: $HTTP_STATUS"
        fi
      fi